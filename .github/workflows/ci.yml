name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Verify, Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Git whitespace check
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --check "${{ github.event.pull_request.base.sha }}...HEAD"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            git diff --check "${{ github.event.before }}..HEAD"
          else
            git diff-tree --check --no-commit-id --root -r HEAD
          fi

      - name: Verify Drizzle migration journal
        run: pnpm verify:migrations

      - name: Verify DB invariants
        run: pnpm verify:db-invariants

      - name: Typecheck all packages
        run: pnpm typecheck

      - name: Test all packages
        run: pnpm test

      - name: Build all packages
        run: pnpm build
