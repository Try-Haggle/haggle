name: HFMI Daily Price Collection

on:
  schedule:
    # Run daily at 03:00 UTC (12:00 KST)
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Run eBay electronics market data collection
        run: pnpm --filter @haggle/api exec tsx ../../scripts/crawl-ebay-electronics.ts
        env:
          NODE_ENV: production

      - name: Insert to database
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is not configured; skipping database insert."
            exit 0
          fi

          # Use the generated SQL file to insert data
          echo "Inserting $(wc -l < scripts/ebay-electronics-full.csv) observations..."
          pnpm --filter @haggle/api exec tsx ../../scripts/run-hfmi-migration.ts || true
          # Direct SQL insert via node
          node -e "
            const fs = require('fs');
            const postgres = require('${{ github.workspace }}/packages/db/node_modules/postgres');
            const sql = postgres(process.env.DATABASE_URL, { max: 1 });
            const sqlContent = fs.readFileSync('scripts/ebay-electronics-full.sql', 'utf-8');
            sql.unsafe(sqlContent)
              .then(() => { console.log('Insert complete'); return sql.end(); })
              .catch(e => { console.error('Insert failed:', e.message); sql.end(); process.exit(1); });
          "
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload market data artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hfmi-market-data-${{ github.run_number }}
          path: |
            scripts/ebay-electronics-full.csv
            scripts/ebay-electronics-full.sql
          retention-days: 30

      - name: Summary
        run: |
          echo "## HFMI Market Data Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(tail -n +2 scripts/ebay-electronics-full.csv | wc -l)
          echo "- **Total observations:** $TOTAL" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Category Breakdown" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -n +2 scripts/ebay-electronics-full.csv | cut -d',' -f2 | sort | uniq -c | sort -rn >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
