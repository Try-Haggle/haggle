<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haggle Buddy Prompt Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }

  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

  h1 { text-align: center; margin-bottom: 8px; font-size: 1.6em; background: linear-gradient(135deg, #f0c27f, #4b1248); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { text-align: center; color: #888; margin-bottom: 24px; font-size: 0.9em; }

  .controls { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .controls select, .controls input { padding: 10px 14px; border: 1px solid #333; border-radius: 8px; background: #1a1a24; color: #e0e0e0; font-size: 14px; }
  .controls select { min-width: 160px; }
  .controls input { flex: 1; min-width: 200px; }

  .tag-filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .tag-btn { padding: 6px 14px; border: 1px solid #333; border-radius: 20px; background: #1a1a24; color: #aaa; cursor: pointer; font-size: 13px; transition: all 0.2s; }
  .tag-btn:hover { border-color: #666; }
  .tag-btn.active { border-color: #f0c27f; color: #f0c27f; background: #2a1a10; }

  .buddy-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .buddy-card { padding: 14px; border: 1px solid #222; border-radius: 10px; background: #12121a; cursor: pointer; transition: all 0.2s; }
  .buddy-card:hover { border-color: #555; transform: translateY(-2px); }
  .buddy-card.selected { border-color: #f0c27f; background: #1a1510; }
  .buddy-card .num { font-size: 11px; color: #666; }
  .buddy-card .name { font-size: 16px; font-weight: 600; margin: 4px 0; }
  .buddy-card .name-en { font-size: 12px; color: #888; }
  .buddy-card .tag-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-top: 6px; }
  .buddy-card .meta { font-size: 12px; color: #777; margin-top: 6px; }
  .buddy-card.hidden { display: none; }

  .detail-panel { border: 1px solid #333; border-radius: 12px; background: #12121a; padding: 24px; margin-bottom: 20px; display: none; }
  .detail-panel.show { display: block; }
  .detail-panel h2 { margin-bottom: 16px; font-size: 1.3em; }

  .grade-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .grade-tab { padding: 6px 14px; border: 1px solid #333; border-radius: 8px; background: #1a1a24; color: #aaa; cursor: pointer; font-size: 13px; transition: all 0.2s; }
  .grade-tab:hover { border-color: #666; }
  .grade-tab.active { font-weight: 600; }
  .grade-tab[data-grade="Common"].active { border-color: #ccc; color: #fff; background: #2a2a2a; }
  .grade-tab[data-grade="Uncommon"].active { border-color: #4ade80; color: #4ade80; background: #0a2a10; }
  .grade-tab[data-grade="Rare"].active { border-color: #60a5fa; color: #60a5fa; background: #0a1a2a; }
  .grade-tab[data-grade="Epic"].active { border-color: #a78bfa; color: #a78bfa; background: #1a0a2a; }
  .grade-tab[data-grade="Legendary"].active { border-color: #fbbf24; color: #fbbf24; background: #2a1a0a; }
  .grade-tab[data-grade="Mythic"].active { border-color: #f43f5e; color: #f43f5e; background: #2a0a0a; }

  .prompt-box { background: #0a0a12; border: 1px solid #333; border-radius: 8px; padding: 16px; margin-bottom: 12px; white-space: pre-wrap; font-family: 'SF Mono', Menlo, monospace; font-size: 13px; line-height: 1.6; color: #d0d0d0; max-height: 400px; overflow-y: auto; }
  .prompt-section { margin-bottom: 12px; }
  .prompt-label { color: #f0c27f; font-weight: 600; margin-bottom: 4px; }

  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .copy-btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .copy-btn.primary { background: linear-gradient(135deg, #f0c27f, #c68a3f); color: #000; }
  .copy-btn.primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(240,194,127,0.3); }
  .copy-btn.secondary { background: #2a2a34; color: #ccc; border: 1px solid #444; }
  .copy-btn.secondary:hover { background: #3a3a44; }
  .copied { background: #22c55e !important; color: #000 !important; }

  .lang-toggle { display: flex; gap: 4px; align-items: center; }
  .lang-toggle label { font-size: 13px; color: #888; cursor: pointer; }
  .lang-toggle input { accent-color: #f0c27f; }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .info-item { font-size: 13px; }
  .info-item .label { color: #888; }
  .info-item .value { color: #e0e0e0; }

  @media (max-width: 600px) {
    .buddy-grid { grid-template-columns: 1fr; }
    .info-grid { grid-template-columns: 1fr; }
    .controls { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Buddy Prompt Generator</h1>
  <p class="subtitle">버디를 선택하고 등급을 고르면 AI 이미지 생성용 프롬프트가 만들어집니다</p>

  <div class="tag-filters">
    <button class="tag-btn active" data-tag="all">전체</button>
    <button class="tag-btn" data-tag="Spark">⚡ Spark</button>
    <button class="tag-btn" data-tag="Swift">👟 Swift</button>
    <button class="tag-btn" data-tag="Forge">⚙️ Forge</button>
    <button class="tag-btn" data-tag="Stone">🏛️ Stone</button>
    <button class="tag-btn" data-tag="Tide">🌊 Tide</button>
    <button class="tag-btn" data-tag="Prism">🔮 Prism</button>
    <button class="tag-btn" data-tag="Hybrid">🌀 Hybrid</button>
  </div>

  <div class="controls">
    <input type="text" id="search" placeholder="검색 (이름, 키워드)">
  </div>

  <div class="buddy-grid" id="buddyGrid"></div>

  <div class="detail-panel" id="detailPanel">
    <h2 id="detailTitle"></h2>
    <div class="info-grid" id="infoGrid"></div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <div>
        <strong style="font-size:14px;">진화 레퍼런스 시트 프롬프트</strong>
        <span style="font-size:12px; color:#888;"> — 한 장에 모든 등급</span>
      </div>
      <div class="lang-toggle">
        <input type="checkbox" id="langToggle" checked>
        <label for="langToggle">영어 프롬프트</label>
      </div>
    </div>

    <div class="prompt-box" id="promptBox"></div>

    <div class="btn-row">
      <button class="copy-btn primary" id="copyFull">도감 페이지 프롬프트 복사</button>
      <button class="copy-btn secondary" id="copyLora">LoRA 학습용 프롬프트 복사</button>
      <button class="copy-btn secondary" id="copyAppearance">기본 외형만 복사</button>
      <button class="copy-btn secondary" id="copyEvolutions">진화 단계만 복사</button>
    </div>
  </div>
</div>

    appearance: "진주로 된 갑옷을 입은 거북. 등껍질이 거대한 자개함(螺鈿箱). 자물쇠도 경첩도 없는 이음새가 있다 — 열릴 것 같지만 열리지 않는다. 안에 보물의 잔상이 보관되어 있다. 한 발짝마다 물결(Tide)과 진동(Stone)이 동시에 퍼진다.",
    personality: "테소르의 '놓지 못한다'와 볼라의 '가지면 식는다'가 한 몸에서 영원히 갈등하는 존재. 열면 가치가 변하고, 닫으면 갈망이 커진다. 슈뢰딩거의 보물함. 진주갑은 이 딜레마를 알고 있다.",
    habitat: "트레져리프트-스톤헤이븐 경계 심해 동굴. 가장 깊고 가장 조용한 곳",
    special: "벨(볼라)이 보면 에코가 밝아지며 동시에 어두워진다. 볼트(테소르)가 보면 크러스트가 처음으로 미세하게 움직인다.",
    grades: {
      "Epic": "자개 등껍질에 산호 장식. 이음새가 희미하게 보임. 내부 잔상 3개가 빛의 흔적으로 표면에 새어 나옴. 이동 시 물결+석재 갈라짐이 동심원으로 퍼짐.",
      "Legendary": "순금 테두리 자개 + 대리석 다리. 이음새가 선명 — 열릴 것 같지만 열리지 않는다. 내부 잔상이 반투명하게 비치기 시작. 정착의 빛(Stone)과 갈망의 빛(Tide)이 동시 발동하며 서로 간섭.",
      "Mythic": "등껍질이 투명 자개. 내부 보물 잔상이 완전히 보인다. 이음새가 열려도 닫혀도 아닌 상태로 고정. 주변에 시간이 멈춘 공간 형성 — 열림과 닫힘이 결정되지 않은 순간이 영원히 지속. 벨이 들어가면 에코가 가장 밝게 빛나다 천천히 꺼진다. 볼트가 들어가면 크러스트가 처음으로 일어서려 한다."
    }
  }
];

const TAG_COLORS = {
  Spark: "#facc15", Swift: "#a78bfa", Forge: "#f97316",
  Stone: "#94a3b8", Tide: "#22d3ee", Prism: "#e879f9", Hybrid: "#4ade80"
};

let selectedBuddy = null;

const GRADE_EMOJI = { Common: "⬜", Uncommon: "🟩", Rare: "🟦", Epic: "🟪", Legendary: "🟨", Mythic: "🔴" };

function render() {
  const grid = document.getElementById("buddyGrid");
  const search = document.getElementById("search").value.toLowerCase();
  const activeTag = document.querySelector(".tag-btn.active")?.dataset.tag || "all";

  grid.innerHTML = BUDDIES.map(b => {
    const matchTag = activeTag === "all" || b.tag === activeTag;
    const matchSearch = !search || b.name.includes(search) || b.nameEn.toLowerCase().includes(search) || b.appearance.includes(search);
    const hidden = (!matchTag || !matchSearch) ? "hidden" : "";
    const sel = selectedBuddy?.id === b.id ? "selected" : "";
    const color = TAG_COLORS[b.tag] || "#888";
    const gradeList = Object.keys(b.grades).map(g => GRADE_EMOJI[g] || g).join(" ");
    return `<div class="buddy-card ${sel} ${hidden}" onclick="selectBuddy('${b.id}')">
      <span class="num">${b.id}</span>
      <div class="name">${b.name}</div>
      <div class="name-en">${b.nameEn}</div>
      <span class="tag-badge" style="border:1px solid ${color}; color:${color}">${b.tag}</span>
      <div class="meta">${gradeList} | ${b.height} / ${b.freq}</div>
    </div>`;
  }).join("");
}

function selectBuddy(id) {
  selectedBuddy = BUDDIES.find(b => b.id === id);
  const panel = document.getElementById("detailPanel");
  panel.classList.add("show");

  document.getElementById("detailTitle").textContent = `${id} ${selectedBuddy.name} (${selectedBuddy.nameEn})`;

  const infoGrid = document.getElementById("infoGrid");
  infoGrid.innerHTML = [
    ["태그", selectedBuddy.tag], ["지역", selectedBuddy.region],
    ["베이스", selectedBuddy.base], ["출현 빈도", selectedBuddy.freq],
    ["키", selectedBuddy.height], ["몸무게", selectedBuddy.weight],
    ["진화 단계", Object.keys(selectedBuddy.grades).join(" → ")]
  ].map(([l,v]) => `<div class="info-item"><span class="label">${l}:</span> <span class="value">${v}</span></div>`).join("");

  updatePrompt();
  render();
  panel.scrollIntoView({ behavior: "smooth", block: "start" });
}

function buildAllGradesText(b) {
  return Object.entries(b.grades).map(([grade, desc]) => `[${grade}] ${desc}`).join("\n\n");
}

function buildEncyclopediaPrompt(b) {
  const num = b.id;
  const grades = Object.entries(b.grades);
  const gradeNames = Object.keys(b.grades).join(" → ");
  const numG = grades.length;

  const gradeCards = grades.map(([g, desc]) => `● ${g}: ${desc}`).join("\n");

  return `Create a dark-themed encyclopedia/pokedex page for a fantasy creature. Single vertical page layout, dark navy-black background (#0a0a14).

═══ PAGE LAYOUT ═══

[TOP HEADER]
Large number "${num}." on the left.
Name: "${b.name} (${b.nameEn})" in large white text.
Subtitle: "${b.base} 타입 버디" in smaller gray text.
Right side info panel: 기본 형태: ${b.base} | 키: ${b.height} | 몸무게: ${b.weight} | 태그: ${b.tag} | 지역: ${b.region} | 출현 빈도: ${b.freq}

[MIDDLE — EVOLUTION CARDS]
A row of ${numG} cards side by side, each showing the same creature at a different evolution stage. Each card has:
- A portrait illustration of the creature at that stage (dark background, glowing)
- The grade label below (${gradeNames})
- A short Korean description below each

The creature's base form: ${b.appearance}

Evolution stages left to right:
${gradeCards}

Each stage should be progressively more luminous, detailed, and powerful-looking. Colors intensify. Glow effects increase. Details and patterns emerge.

[BOTTOM LEFT — DETAILS]
"활동 지역" section: ${b.habitat}
"크기비교" section: silhouette of the creature next to an average adult human for scale (creature is ${b.height} tall)
"특이사항" section: ${b.special}

[BOTTOM RIGHT — SCENE ILLUSTRATIONS]
${numG} small rectangular scene thumbnails showing the creature in its natural habitat:
${grades.map(([g, desc], i) => `Scene ${i+1} (${g}): The ${b.nameEn} in ${b.habitat}, ${desc.split('.')[0].toLowerCase()}`).join("\n")}

═══ STYLE ═══
Dark UI design, game encyclopedia aesthetic, sci-fi fantasy crossover. Glowing neon accents matching the ${b.tag} elemental theme. Clean typography. High detail illustrations. Professional creature design reference sheet. Korean text labels. Similar to a Pokedex or Genshin Impact archive page.`;
}

function updatePrompt() {
  if (!selectedBuddy) return;
  const b = selectedBuddy;
  const isEn = document.getElementById("langToggle").checked;
  const box = document.getElementById("promptBox");
  const grades = Object.entries(b.grades);
  const num = b.id;

  const gradeCardsHtml = grades.map(([grade, desc]) => {
    const color = {"Common":"#ccc","Uncommon":"#4ade80","Rare":"#60a5fa","Epic":"#a78bfa","Legendary":"#fbbf24","Mythic":"#f43f5e"}[grade] || "#ccc";
    return `<div style="flex:1; min-width:120px; border:1px solid #333; border-radius:8px; padding:10px; background:#0a0a14;">
      <div style="text-align:center; color:${color}; font-weight:700; font-size:13px; margin-bottom:6px;">${GRADE_EMOJI[grade]} ${grade}</div>
      <div style="font-size:12px; color:#bbb; line-height:1.5;">${desc}</div>
    </div>`;
  }).join("");

  if (isEn) {
    box.innerHTML =
    `<div class="prompt-section"><div class="prompt-label">═══ PAGE LAYOUT ═══</div></div>` +

    `<div class="prompt-section"><div class="prompt-label">[TOP HEADER]</div>` +
    `<strong>#${num}. ${b.name} (${b.nameEn})</strong><br>` +
    `${b.base} type | ${b.tag} tag | ${b.region}<br>` +
    `Height: ${b.height} | Weight: ${b.weight} | Frequency: ${b.freq}</div>` +

    `<div class="prompt-section"><div class="prompt-label">[CREATURE BASE]</div>${b.appearance}</div>` +

    `<div class="prompt-section"><div class="prompt-label">[EVOLUTION CARDS — ${grades.length} stages, left to right]</div>` +
    `<div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;">${gradeCardsHtml}</div></div>` +

    `<div class="prompt-section"><div class="prompt-label">[BOTTOM — DETAILS]</div>` +
    `활동 지역: ${b.habitat}<br>` +
    `크기비교: creature (${b.height}) next to human silhouette<br>` +
    `특이사항: ${b.special}<br>` +
    `성격: ${b.personality}</div>` +

    `<div class="prompt-section"><div class="prompt-label">[STYLE]</div>` +
    `Dark UI encyclopedia page, game archive aesthetic, ${grades.length} evolution portraits side by side, scene thumbnails at bottom, Korean text labels, glowing ${b.tag} elemental accents, professional creature design reference sheet</div>`;
  } else {
    box.innerHTML =
    `<div class="prompt-section"><div class="prompt-label">═══ 페이지 레이아웃 ═══</div></div>` +

    `<div class="prompt-section"><div class="prompt-label">[상단 헤더]</div>` +
    `<strong>#${num}. ${b.name} (${b.nameEn})</strong><br>` +
    `${b.base} 타입 | ${b.tag} 태그 | ${b.region}<br>` +
    `키: ${b.height} | 몸무게: ${b.weight} | 출현 빈도: ${b.freq}</div>` +

    `<div class="prompt-section"><div class="prompt-label">[기본 외형]</div>${b.appearance}</div>` +

    `<div class="prompt-section"><div class="prompt-label">[진화 카드 — ${grades.length}단계, 왼쪽→오른쪽]</div>` +
    `<div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;">${gradeCardsHtml}</div></div>` +

    `<div class="prompt-section"><div class="prompt-label">[하단 정보]</div>` +
    `활동 지역: ${b.habitat}<br>` +
    `크기비교: 버디(${b.height})와 성인 실루엣 비교<br>` +
    `특이사항: ${b.special}<br>` +
    `성격: ${b.personality}</div>`;
  }
}

function getPromptText(mode) {
  if (!selectedBuddy) return "";
  const b = selectedBuddy;
  const isEn = document.getElementById("langToggle").checked;

  if (mode === "full") {
    if (isEn) return buildEncyclopediaPrompt(b);
    // Korean version
    const num = b.id;
    const grades = Object.entries(b.grades);
    const gradeCards = grades.map(([g, desc]) => `● ${g}: ${desc}`).join("\n");
    return `어두운 테마의 판타지 생물 도감/포켓몬 도감 스타일 페이지를 만들어줘. 세로 한 장, 짙은 남색-검정 배경 (#0a0a14).

═══ 페이지 레이아웃 ═══

[상단 헤더]
왼쪽에 큰 숫자 "${num}."
이름: "${b.name} (${b.nameEn})" 큰 흰색 텍스트.
부제: "${b.base} 타입 버디" 작은 회색 텍스트.
오른쪽 정보 패널: 기본 형태: ${b.base} | 키: ${b.height} | 몸무게: ${b.weight} | 태그: ${b.tag} | 지역: ${b.region} | 출현 빈도: ${b.freq}

[중간 — 진화 카드]
${grades.length}개의 카드를 나란히 배치. 각 카드에:
- 해당 단계의 생물 초상화 (어두운 배경, 발광)
- 아래에 등급 라벨
- 각 단계 아래 한국어 설명

생물 기본 외형: ${b.appearance}

진화 단계 (왼쪽→오른쪽):
${gradeCards}

각 단계는 점점 더 밝고, 디테일하고, 강력하게. 색이 진해지고 발광 효과가 강해지며 무늬와 장식이 추가.

[하단 왼쪽]
"활동 지역": ${b.habitat}
"크기비교": 성인 인간 실루엣 옆에 버디 (${b.height}) 크기 비교
"특이사항": ${b.special}

[하단 오른쪽 — 장면 일러스트]
${grades.length}개의 작은 직사각형 장면 썸네일. 서식지에서의 버디 모습.

═══ 스타일 ═══
어두운 UI 디자인, 게임 도감 미학, SF 판타지 크로스오버. ${b.tag} 태그에 맞는 네온 발광. 한국어 텍스트 라벨. 포켓몬 도감이나 원신 아카이브 페이지와 유사한 느낌.`;
  }
  if (mode === "appearance") return b.appearance;
  if (mode === "evolutions") return buildAllGradesText(b);
  if (mode === "lora") return buildLoraPrompt(b);
  return "";
}

function buildLoraPrompt(b) {
  const grades = Object.entries(b.grades);
  const angles = ["front view", "3/4 view", "side view (left)", "side view (right)", "back view", "slightly above angle", "slightly below angle"];

  const baseType = b.base.toLowerCase();
  let poses;
  if (baseType.includes("원소") || baseType.includes("추상")) {
    poses = ["floating idle", "hovering gently", "expanding outward", "contracting inward", "drifting slowly", "pulsing with energy", "dormant/dim"];
  } else if (baseType.includes("오브젝트") && !baseType.includes("동물")) {
    poses = ["stationary idle", "slightly tilted", "rotating slowly", "vibrating/humming", "activating/glowing", "moving forward", "resting/powered down"];
  } else {
    poses = ["standing idle", "walking", "sitting", "curious/looking up", "alert/defensive", "happy/excited", "sleeping/resting"];
  }

  let output = `Generate a ${grades.length * 6}-image training set for a fantasy creature called "${b.nameEn}".
All images must show the EXACT SAME character. Only vary the camera angle and energy level.

═══ CHARACTER SHEET ═══

Name: ${b.nameEn}
Type: ${b.base}
Size: ${b.height}

CORE IDENTITY (include in EVERY image prompt):
${b.appearance}

RULES:
- Same silhouette and proportions in every image
- Do NOT add or remove limbs, appendages, or features
- Dark background, single character centered, no text
- Digital art, fantasy creature, high quality

═══ IMAGE PROMPTS (copy each line as a separate generation) ═══

`;

  grades.forEach(([grade, desc]) => {
    // Convert the Korean tier description to a more AI-friendly English-mixed version
    output += `── ${grade} ──\n`;

    for (let i = 0; i < 6; i++) {
      output += `${grade}-${i+1}. ${b.nameEn}, ${b.appearance} --tier ${grade.toLowerCase()}: ${desc} --camera ${angles[i]}, ${poses[i]} --style dark background, single character, centered, digital art, fantasy creature design, high quality, consistent character sheet\n`;
    }
    output += `\n`;
  });

  output += `═══ TIER CONTROL (use after LoRA is trained) ═══
Common:    "dim, faint, simple, muted, translucent, minimal detail"
Uncommon:  "soft glow, slightly brighter, subtle pattern emerging"
Rare:      "glowing, detailed patterns, visible markings, vivid color"
Epic:      "intense glow, neon, holographic, elaborate, aura, maximum detail"
Legendary: "golden radiance, ornate, ethereal, transcendent glow"
Mythic:    "blinding radiance, cosmic, reality-bending, ultimate form"`;

  return output;
}

async function copyText(mode) {
  const text = getPromptText(mode);
  await navigator.clipboard.writeText(text);
  const btnId = mode === "full" ? "copyFull" : mode === "appearance" ? "copyAppearance" : "copyEvolutions";
  const btn = document.getElementById(btnId);
  const orig = btn.textContent;
  btn.textContent = "Copied!";
  btn.classList.add("copied");
  setTimeout(() => { btn.textContent = orig; btn.classList.remove("copied"); }, 1500);
}

document.getElementById("copyFull").onclick = () => copyText("full");
document.getElementById("copyLora").onclick = () => copyText("lora");
document.getElementById("copyAppearance").onclick = () => copyText("appearance");
document.getElementById("copyEvolutions").onclick = () => copyText("evolutions");
document.getElementById("langToggle").onchange = updatePrompt;
document.getElementById("search").oninput = render;

document.querySelectorAll(".tag-btn").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".tag-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
  };
});

render();
</script>
</body>
</html>
