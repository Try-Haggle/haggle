function snap5(v){return OPTIONS.reduce((b,x)=>Math.abs(x-v)<Math.abs(b-v)?x:b);}

// ====== K-Means ======
function kMeans(data,k,maxIter=100){
  if(data.length<=k)return{labels:data.map((_,i)=>i),centers:data.map(d=>[d])};
  const centers=[data[Math.floor(Math.random()*data.length)]];
  while(centers.length<k){const dist=data.map(d=>Math.min(...centers.map(c=>(d[0]-c[0])**2)));const total=dist.reduce((a,b)=>a+b,0);if(total===0)break;const probs=dist.map(d=>d/total);let r=Math.random(),cum=0;for(let i=0;i<probs.length;i++){cum+=probs[i];if(cum>=r){centers.push([...data[i]]);break;}}}
  let labels=new Array(data.length).fill(0);
  for(let iter=0;iter<maxIter;iter++){labels=data.map(d=>{let m=Infinity,mi=0;centers.forEach((c,i)=>{const dd=(d[0]-c[0])**2;if(dd<m){m=dd;mi=i;}});return mi;});let changed=false;for(let c=0;c<k;c++){const mm=data.filter((_,i)=>labels[i]===c);if(mm.length>0){const nc=mm.reduce((s,x)=>s+x[0],0)/mm.length;if(Math.abs(nc-centers[c][0])>0.01)changed=true;centers[c]=[nc];}}if(!changed)break;}
  return{labels,centers:centers.map(c=>c[0])};
}
function determineOptimalK(data,maxK=5){if(data.length<10)return 2;const inertias=[];for(let k=2;k<=Math.min(maxK,data.length-1);k++){const{labels,centers}=kMeans(data,k);let in_=0;data.forEach((d,i)=>{in_+=(d[0]-centers[labels[i]])**2;});inertias.push(in_);}if(inertias.length<2)return 2;const dec=inertias.slice(0,-1).map((v,i)=>v-inertias[i+1]);for(let i=0;i<dec.length-1;i++){if(dec[i+1]<dec[i]*0.5)return i+2;}return 3;}
function runKMeans(votes,seed=42){
  const orig=Math.random;let s=seed;Math.random=()=>{s=(s*16807)%2147483647;return(s-1)/2147483646;};
  const weighted=[];votes.forEach(v=>{const reps=Math.max(1,Math.round(v.weight*2));for(let r=0;r<reps;r++)weighted.push([v.value]);});
  const optK=determineOptimalK(weighted);const{labels,centers}=kMeans(weighted,optK);
  const sizes={};labels.forEach(l=>{sizes[l]=(sizes[l]||0)+1;});
  const majId=Object.entries(sizes).sort((a,b)=>b[1]-a[1])[0][0];
  const majV=weighted.filter((_,i)=>labels[i]==majId).map(v=>v[0]);
  const counts={};majV.forEach(v=>{counts[v]=(counts[v]||0)+1;});
  const[modeVal,modeCount]=Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
  const modePct=modeCount/majV.length;
  let result;if(modePct>=0.5)result=parseInt(modeVal);else{const c=centers[majId];result=[0,25,50,75,100].reduce((b,x)=>Math.abs(x-c)<Math.abs(b-c)?x:b);}
  const clusters={};labels.forEach((l,i)=>{if(!clusters[l])clusters[l]={values:[],center:centers[l],isMajority:l==majId};clusters[l].values.push(weighted[i][0]);});
  Math.random=orig;
  return{result,k:optK,clusters:Object.values(clusters),totalWeightedVotes:weighted.length};
}

// ====== 소규모: 가중다수결 ======
function runWeightedMajority(votes){
  const buckets={};OPTIONS.forEach(o=>{buckets[o]={count:0,weight:0,voters:[]};});
  votes.forEach((v,i)=>{const s=snap5(v.value);buckets[s].count++;buckets[s].weight+=v.weight;buckets[s].voters.push({...v,idx:i});});
  const totalW=votes.reduce((s,v)=>s+v.weight,0);
  const ranked=OPTIONS.map(o=>({option:o,...buckets[o],pct:buckets[o].weight/totalW*100})).sort((a,b)=>b.weight-a.weight);
  const winner=ranked[0];
  const margin=ranked.length>1?(winner.pct-ranked[1].pct):100;
  let strength,sColor,sLabel;
  if(winner.pct>=60){strength="strong";sColor="#2ecc71";sLabel="압도적 다수";}
  else if(winner.pct>=45){strength="moderate";sColor="#f39c12";sLabel="과반 다수";}
  else if(winner.pct>=35){strength="weak";sColor="#e67e22";sLabel="상대 다수";}
  else{strength="plural";sColor="#e74c3c";sLabel="다수 불명확";}
  return{winner:winner.option,winnerWeight:winner.weight,winnerPct:winner.pct,winnerCount:winner.count,buckets,ranked,totalW,margin,strength,sColor,sLabel};
}

// ====== 대규모: Trimmed Mean ======
function runTrimmedMean(votes,trimPct=0.20){
  const sorted=[...votes].sort((a,b)=>a.value-b.value);
  const totalW=sorted.reduce((s,v)=>s+v.weight,0);const trimW=totalW*trimPct;
  let cumL=0;const afterLow=[],tLow=[];
  for(const v of sorted){if(cumL+v.weight<=trimW){cumL+=v.weight;tLow.push(v);}else afterLow.push(v);}
  let cumH=0;const final=[],tHigh=[];
  for(const v of[...afterLow].reverse()){if(cumH+v.weight<=trimW){cumH+=v.weight;tHigh.push(v);}else final.push(v);}
  if(final.length===0)final.push(...afterLow);
  const wSum=final.reduce((s,v)=>s+v.value*v.weight,0);
  const wW=final.reduce((s,v)=>s+v.weight,0);
  const raw=wSum/wW;
  return{result:Math.round(raw/5)*5,rawMean:raw,trimmedLow:tLow,trimmedHigh:tHigh,included:final,totalVoters:votes.length,includedVoters:final.length};
}
function runWeightedMean(votes){
  const wSum=votes.reduce((s,v)=>s+v.value*v.weight,0);
  const wW=votes.reduce((s,v)=>s+v.weight,0);
  const raw=wSum/wW;const variance=votes.reduce((s,v)=>s+v.weight*(v.value-raw)**2,0)/wW;
  return{result:Math.round(raw/5)*5,rawMean:raw,stdDev:Math.sqrt(variance),totalVoters:votes.length,totalWeight:wW};
}

// ====== Agreement Zone ======
function analyzeAgreement(votes,center,method,param){
  const totalWeight=votes.reduce((s,v)=>s+v.weight,0);
  const wMean=votes.reduce((s,v)=>s+v.value*v.weight,0)/totalWeight;
  const wVar=votes.reduce((s,v)=>s+v.weight*(v.value-wMean)**2,0)/totalWeight;
  const wStd=Math.sqrt(wVar);
  let low,high;
  if(method==="sigma"){low=Math.max(0,center-param*wStd);high=Math.min(100,center+param*wStd);}
  else{low=Math.max(0,center-param);high=Math.min(100,center+param);}
  const inside=[],outside=[];
  votes.forEach((v,i)=>{if(v.value>=low&&v.value<=high)inside.push({...v,idx:i});else outside.push({...v,idx:i});});
  const insideWeight=inside.reduce((s,v)=>s+v.weight,0);
  const agreementRatio=insideWeight/totalWeight;
  let refinedResult=center;
  if(inside.length>0){const rr=inside.reduce((s,v)=>s+v.value*v.weight,0)/insideWeight;refinedResult=Math.round(rr/5)*5;}
  let strength,sColor,sLabel;
  if(agreementRatio>=0.75){strength="strong";sColor="#2ecc71";sLabel="강한 합의";}
  else if(agreementRatio>=0.60){strength="moderate";sColor="#f39c12";sLabel="보통 합의";}
  else if(agreementRatio>=0.45){strength="weak";sColor="#e67e22";sLabel="약한 합의";}
  else{strength="failed";sColor="#e74c3c";sLabel="합의 실패";}
  return{low,high,wStd,inside,outside,insideCount:inside.length,outsideCount:outside.length,agreementRatio,refinedResult,strength,sColor,sLabel,totalVoters:votes.length};
}

      React.createElement("button",{onClick:()=>setShowResearch(!showResearch),style:{width:"100%",padding:"10px 14px",background:"#0e0e0e",border:"1px solid #1a1a1a",borderRadius:10,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",color:"#c8a96e"}},
        React.createElement("span",{style:{fontSize:12,fontWeight:700}},"📚 시스템 설계 근거"),
        React.createElement("span",{style:{fontSize:10,color:"#666"}},showResearch?"▲":"▼")),
      showResearch&&React.createElement("div",{className:"fade-in",style:{background:"#0e0e0e",borderRadius:"0 0 10px 10px",padding:16,border:"1px solid #1a1a1a",borderTopColor:"transparent",marginTop:-1}},
        // 패널 분기 근거
        React.createElement("div",{style:{marginBottom:16}},
          React.createElement("h4",{style:{color:"#c8a96e",fontSize:12,marginBottom:6}},`패널 분기점: 왜 ${PANEL_THRESHOLD}명인가`),
          React.createElement("div",{style:{fontSize:10,color:"#999",lineHeight:1.8}},
            React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
              React.createElement("div",{style:{background:"#111",borderRadius:8,padding:10,border:"1px solid #2ecc7722"}},
                React.createElement("div",{style:{color:"#2ecc71",fontWeight:700,fontSize:11,marginBottom:4}},`소규모 (<${PANEL_THRESHOLD}명)`),
                React.createElement("div",{style:{lineHeight:1.8}},
                  "• 5옵션 직접투표 (0/25/50/75/100%)",React.createElement("br"),
                  "• 가중 다수결로 즉시 판정",React.createElement("br"),
                  "• Trim/σ 불필요 — 표본이 작아 통계 무의미",React.createElement("br"),
                  "• ISU 피겨스케이팅: 9명 심판 → 이산적 GOE")),
              React.createElement("div",{style:{background:"#111",borderRadius:8,padding:10,border:"1px solid #3498db22"}},
                React.createElement("div",{style:{color:"#3498db",fontWeight:700,fontSize:11,marginBottom:4}},`대규모 (≥${PANEL_THRESHOLD}명)`),
                React.createElement("div",{style:{lineHeight:1.8}},
                  "• 연속값 0~100% 투표",React.createElement("br"),
                  "• Trimmed Mean + 합의구간 검증",React.createElement("br"),
                  "• Wilcox(2003): n≥20에서 20% trim 최적",React.createElement("br"),
                  "• LIBOR: 18명 → 22% trim"))))),
        // Trim %
        React.createElement("div",{style:{marginBottom:16}},
          React.createElement("h4",{style:{color:"#2ecc71",fontSize:12,marginBottom:6}},"Trim 20%: Wilcox & Keselman (2003)"),
          React.createElement("div",{style:{fontSize:10,color:"#999",lineHeight:1.8}},
            "Psychological Methods Vol.8 No.3 — 시뮬레이션으로 20% trim이 정규·비정규 분포 모두에서 표준오차 최소화. n<20이면 25% trim 권장 (Rosenberger & Gasko 1983). LIBOR는 22%, ISU는 ~11%.")),
        // σ
        React.createElement("div",{style:{marginBottom:16}},
          React.createElement("h4",{style:{color:"#f39c12",fontSize:12,marginBottom:6}},"합의구간 1.0σ: Kleros IQR vs 정규분포"),
          React.createElement("div",{style:{fontSize:10,color:"#999",lineHeight:1.8}},
            "1σ=68.3% 포함. Kleros의 IQR(50%)보다 관대하고, 2σ(95.4%)보다 엄격. '실질적 다수 동의 범위'로서 합리적 균형점. 패널 규모가 커질수록 σ 추정 신뢰도 상승.")),
        // Kleros
        React.createElement("div",null,
          React.createElement("h4",{style:{color:"#e74c3c",fontSize:12,marginBottom:6}},"Kleros 대비 Haggle 차별점"),
          React.createElement("div",{style:{fontSize:10,color:"#999",lineHeight:1.8}},
            "Kleros: 이진/다지선다 Schelling Point + 토큰 스테이킹. 장점=게임이론 정합성. 단점=정확한 비율 판정 불가.",React.createElement("br"),
            "Haggle: 소규모=5옵션 가중다수결, 대규모=연속값 Trimmed Mean+합의검증. DS 티어가 스테이킹 역할 대체 (평판 기반 가중치).")))),

    // Footer
    React.createElement("div",{style:{textAlign:"center",fontSize:9,color:"#222",marginTop:12,...MONO}},
      `threshold=${PANEL_THRESHOLD} | trim=20% | σ=1.0 | v5`)
  );
}
